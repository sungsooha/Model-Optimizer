# QAT (Quantization-Aware Training) — INT8
#
# Same quantization config as PTQ, but with mode: qat and a training loop.
# PTQ calibrates in minutes; QAT fine-tunes for better accuracy (hours).
#
# Maps to: mtq.quantize(model, config, calibrate) → model.train() loop
version: "1.0"
metadata:
  name: qat_int8
  description: "INT8 quantization-aware training with AWQ initialization"
  tags: [qat, int8, awq]

quantization:
  mode: qat
  preset: int8_sq
  algorithm: {method: smoothquant}
  kv_cache: {format: fp8}
  calibration:
    dataset: cnn_dailymail
    num_samples: 512
  training:
    learning_rate: 1e-5
    num_epochs: 2
    batch_size: 4
    warmup_steps: 100
    weight_decay: 0.01

export:
  format: hf
