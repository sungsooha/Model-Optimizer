# Big Pareto Sweep Config — Demo
#
# Defines the Cartesian product of recipe × model × cluster × eval tasks.
# 2 models × 4 recipes × 2 clusters = 16 jobs, each evaluated on 2 tasks.
#
# Usage:
#   modelopt-recipes dry-run --config examples/recipes/experiments/sweep_demo.yaml
#
version: "1.0"

sweep:
  models:
    - Qwen/Qwen3-8B
    - meta-llama/Llama-3.1-8B-Instruct

  recipes:
    - examples/recipes/ptq/ptq_fp8.yaml
    - examples/recipes/ptq/ptq_nvfp4_awq.yaml
    - examples/recipes/ptq/ptq_nvfp4_local_hessian.yaml
    - examples/recipes/ptq/ptq_nvfp4_skip_first_last.yaml

  launchers:
    - eos           # H100
    - lyris_gb200   # GB200

  eval:
    engine: vllm
    tensor_parallel_size: 8
    tasks:
      - simple_evals.mmlu_pro
      - simple_evals.gpqa_diamond

  execution:
    time_limit: 1200
