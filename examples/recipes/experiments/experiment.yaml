# Big Pareto Experiment Config
#
# Defines the Cartesian product: models x recipes x launchers, plus evaluation.
# 2 models x 3 recipes x 2 clusters = 12 jobs, each evaluated on benchmarks.
#
# Usage:
#   modelopt-recipes dry-run --config examples/recipes/experiments/experiment.yaml
#
version: "1.0"

# --- What to run ---
sweep:
  models:
    - Qwen/Qwen3-8B
    - meta-llama/Llama-3.1-8B-Instruct
  recipes:
    - examples/recipes/ptq/ptq_fp8.yaml                         # Max baseline
    - examples/recipes/ptq/ptq_nvfp4_awq.yaml                   # AWQ
    - examples/recipes/multi_technique/sparse_quantize.yaml      # Sparsity + quantization
  launchers:
    - eos                                               # H100
    - lyris_gb200                                       # GB200
  execution:
    time_limit: 1200

# --- How to measure ---
evaluation:
  benchmark_set: lite                                   # super_lite_eval.yaml (6 benchmarks)
  engine: vllm
  tensor_parallel_size: 8
  tasks:
    - simple_evals.mmlu_pro
    - simple_evals.gpqa_diamond
    - simple_evals.math
    - simple_evals.humaneval

  model_overrides:                                      # per-model benchmark selection
    "Qwen/Qwen3-8B":
      tasks: [simple_evals.humaneval, simple_evals.livecodebench_v5]

  launcher_overrides:                                   # per-hardware constraints
    lyris_gb200:
      tensor_parallel_size: 4
