# Auto-Quantize — Per-Layer Format Search
#
# Equivalent to: mtq.auto_quantize() with constraints
# Use case: Automated per-layer format search within bit budget
# Result: Optimal mixed-precision quantization
#
# Usage:
#   nv-modelopt quantize --model meta-llama/Llama-3-70B --recipe auto_quantize.yaml
#   nv-modelopt quantize --model meta-llama/Llama-3-70B --recipe auto_quantize.yaml --pipeline hopper-eval.yaml
#
version: "1.0"

metadata:
  name: "Auto-Quantize Llama-3-70B"
  description: >
    Per-layer quantization format search targeting 4.8 effective bits.
    Searches between NVFP4-AWQ and FP8 per layer group.
  author: "NVIDIA ModelOpt"
  tags: [auto-quantize, mixed-precision, production]

model:
  path: "meta-llama/Llama-3-70B"
  trust_remote_code: false
  attn_implementation: flash_attention_2

auto_quantize:
  effective_bits: 4.8
  method: gradient         # gradient (requires labels) or kl_div (label-free)
  formats:
    - preset: nvfp4_awq   # NVFP4 with AWQ for maximum compression
    - preset: fp8          # FP8 for layers sensitive to 4-bit
  num_score_steps: 128
  disabled_patterns:
    - "*lm_head*"
    - "*router*"
    - "*mlp.gate.*"
  kv_cache:
    format: fp8
  calibration:
    dataset: cnn_dailymail
    num_samples: 512
    max_sequence_length: 512
    batch_size: 0

export:
  format: hf
  output_dir: ./llama3-70b-auto-4.8bit
  tensor_parallel: 8
