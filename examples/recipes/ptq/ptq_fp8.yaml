# FP8 Post-Training Quantization — Simplest Recipe
#
# Equivalent to: mtq.FP8_DEFAULT_CFG
# Use case: Quick FP8 quantization on Hopper+ GPUs
# Result: 2x memory reduction, 2x compute speedup, minimal accuracy loss
#
# Usage:
#   nv-modelopt --model meta-llama/Llama-3-8B --recipe ptq_fp8.yaml
#
version: "1.0"

metadata:
  name: "FP8 PTQ"
  description: "Standard FP8 (E4M3) post-training quantization with max calibration"
  tags: [fp8, ptq, hopper]

quantization:
  preset: fp8

# All other sections use defaults:
# - calibration: cnn_dailymail, 512 samples, seq_len 512
# - export: hf format
# - algorithm: max (from preset)
