# NVFP4 with First and Last Layers Skipped
#
# Demonstrates per-layer overrides: keeps first and last transformer
# layers at full precision for accuracy-sensitive models.
#
# The override pattern "*layers.N*" matches all quantizers in layer N.
# Adjust layer indices for your model (e.g., layers.31 for 32-layer models).
#
# Usage:
#   config = load_recipe("ptq_nvfp4_skip_first_last.yaml")
#   model = mtq.quantize(model, config["quantize_config"], forward_loop=calibrate)
#
version: "1.0"

metadata:
  name: "NVFP4 Skip First and Last Layers"
  description: >
    NVFP4 quantization with AWQ, but first and last transformer layers
    kept at full precision. Useful for accuracy-sensitive models where
    boundary layers have outsized impact on output quality.
  tags: [nvfp4, awq, per-layer, accuracy]

quantization:
  preset: nvfp4
  algorithm:
    method: awq_lite
    alpha_step: 0.1
  overrides:
    - pattern: "*layers.0*"
      enable: false
    - pattern: "*layers.21*"
      enable: false
