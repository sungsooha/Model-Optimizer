# NVFP4 with Local Hessian Calibration
#
# Uses local hessian-weighted MSE for weight scale search.
# Considers activation info via per-block hessian matrix.
# Initial experiments with Qwen3 8B NVFP4 show improvements.
#
# Equivalent to: NVFP4_W4A4_WEIGHT_LOCAL_HESSIAN_CFG
# See: https://github.com/NVIDIA/Model-Optimizer/pull/788
#
version: "1.0"

metadata:
  name: "NVFP4 Local Hessian Calibration"
  description: >
    NVFP4 W4A4 quantization with local hessian-weighted MSE calibration
    and FP8 scale sweep. Considers activation information by weighing
    scale candidates with local hessian matrix.
  tags: [nvfp4, local-hessian, calibration, w4a4]

quantization:
  preset: nvfp4_local_hessian
