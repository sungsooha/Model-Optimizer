# NVFP4 AWQ with FP8 KV Cache — Production Recipe
#
# Equivalent to: mtq.NVFP4_AWQ_LITE_CFG + FP8_KV_CFG
# Use case: Blackwell-native 4-bit quantization with AWQ calibration
# Result: 4x memory reduction, 4x compute speedup
#
# Usage:
#   nv-modelopt --model meta-llama/Llama-3-70B --recipe ptq_nvfp4_awq.yaml
#
version: "1.0"

metadata:
  name: "NVFP4 AWQ + FP8 KV Cache"
  description: "NVIDIA FP4 quantization with AWQ-Lite calibration and FP8 KV cache"
  author: "NVIDIA ModelOpt"
  tags: [nvfp4, awq, kv-cache, blackwell]

quantization:
  preset: nvfp4

  algorithm:
    method: awq_lite
    alpha_step: 0.1

  kv_cache:
    format: fp8

calibration:
  dataset: cnn_dailymail
  num_samples: 512
  max_sequence_length: 512
  batch_size: 0  # auto-detect optimal batch size

export:
  format: hf
  output_dir: ./nvfp4-awq-output
