# NVFP4 Local Hessian + Per-Layer Overrides + KV Cache
#
# Combines the new local hessian calibration method with:
# - Attention weights kept at FP8 (higher precision for Q/K/V projections)
# - First layer skipped (full precision for embedding-adjacent layer)
# - FP8 KV cache quantization
#
# Shows composability: new calibration method + per-layer overrides + KV cache
# all work together in a single recipe.
#
version: "1.0"

metadata:
  name: "NVFP4 Local Hessian with Mixed Precision Overrides"
  description: >
    Local hessian calibration with attention layers kept at FP8 precision,
    first layer at full precision, and FP8 KV cache. Demonstrates
    combining new calibration methods with per-layer overrides.
  tags: [nvfp4, local-hessian, mixed-precision, per-layer, kv-cache]

quantization:
  preset: nvfp4_local_hessian
  overrides:
    - pattern: "*self_attn*weight_quantizer"
      format: fp8
    - pattern: "*layers.0*"
      enable: false
  kv_cache:
    format: fp8
