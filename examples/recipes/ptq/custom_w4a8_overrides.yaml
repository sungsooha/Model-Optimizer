# Custom W4A8 with Per-Layer Overrides — Advanced Recipe
#
# Equivalent to: W4A8_AWQ_BETA_CFG with manual overrides
# Use case: Mixed-precision INT4 weights + FP8 activations, with specific
#           layers kept at higher precision
#
# Usage:
#   nv-modelopt --model meta-llama/Llama-3-70B --recipe custom_w4a8_overrides.yaml
#
version: "1.0"

metadata:
  name: "Custom W4A8 with Per-Layer Overrides"
  description: >
    INT4 blockwise weights (AWQ) + FP8 activations.
    Attention Q/K/V projections kept at FP8 for quality.
    MoE routers and lm_head disabled.
  tags: [w4a8, awq, custom, mixed-precision]

quantization:
  # Fully custom specification (no preset)
  weights:
    format: int4
    block_sizes:
      last_dim: 128
      type: static
    enable: true

  activations:
    format: fp8
    axis:       # per-tensor

  algorithm:
    method: awq_lite
    alpha_step: 0.1

  # Pattern-based overrides (applied in order)
  overrides:
    # Disable quantization for specific layers
    - pattern: "*lm_head*"
      enable: false
    - pattern: "*block_sparse_moe.gate*"
      enable: false
    - pattern: "*router*"
      enable: false

    # Keep attention weight projections at FP8 for better accuracy
    - pattern: "*self_attn*weight_quantizer"
      format: fp8
      axis:

  kv_cache:
    format: nvfp4
    rotate: true
    bias:
      axes: [-2, -4]
      type: static

calibration:
  dataset: cnn_dailymail
  num_samples: 512
  max_sequence_length: 512
  batch_size: 16

export:
  format: hf
  output_dir: ./w4a8-custom-output
  tensor_parallel: 8
