# Sparsity + Quantization (multi-technique)
#
# Apply 2:4 structured sparsity first, then FP8 quantization.
# Each technique has its own calibration config.
# Execution order: sparsity → quantization.
#
# Maps to: mts.sparsify() → mtq.quantize()
version: "1.0"
metadata:
  name: sparse_quantize
  description: "2:4 sparsity with SparseGPT, then FP8 quantization"
  tags: [sparsity, fp8, multi-technique]

sparsity:
  method: sparse_gpt
  sparsity: 0.5
  pattern: "2:4"
  calibration:
    dataset: pile
    num_samples: 2048

quantization:
  preset: fp8
  kv_cache: {format: fp8}
  calibration:
    dataset: cnn_dailymail
    num_samples: 512

export:
  format: hf
