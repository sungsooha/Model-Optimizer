# Structured Pruning (GradNAS) + FP8 Quantization
#
# Prune the model using gradient-based NAS to find optimal width,
# then quantize the pruned model to FP8.
# Execution order: pruning → quantization.
#
# Maps to: mtp.prune(model, "gradnas", constraints) → mtq.quantize()
version: "1.0"
metadata:
  name: prune_gradnas_fp8
  description: "GradNAS structured pruning (50% FLOPs) + FP8 quantization"
  tags: [pruning, gradnas, fp8, multi-technique]

pruning:
  mode: gradnas
  constraints:
    flops: 0.5            # target 50% of original FLOPs
  calibration:
    dataset: cnn_dailymail
    num_samples: 256
  training:
    learning_rate: 1e-4
    num_epochs: 1
    max_steps: 2000

quantization:
  preset: fp8
  kv_cache: {format: fp8}
  calibration:
    dataset: cnn_dailymail
    num_samples: 512

export:
  format: hf
