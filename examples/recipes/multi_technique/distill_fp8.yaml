# Knowledge Distillation + FP8 Quantization
#
# Distill from a larger teacher model, then quantize the student to FP8.
# Each technique has its own calibration/training config.
# Execution order: quantization → distillation (fine-tune with teacher guidance).
#
# Maps to: mtq.quantize() + distill.convert(KDLossConfig) → training loop
version: "1.0"
metadata:
  name: distill_fp8
  description: "FP8 quantization with knowledge distillation from 70B teacher"
  tags: [distillation, fp8, kd]

quantization:
  preset: fp8
  kv_cache: {format: fp8}
  calibration:
    dataset: cnn_dailymail
    num_samples: 512

distillation:
  teacher: "meta-llama/Llama-3-70B"
  criterion: kl_div
  kd_loss_weight: 0.5
  training:
    learning_rate: 1e-5
    num_epochs: 1
    batch_size: 2
    max_steps: 5000
  calibration:
    dataset: openwebtext
    num_samples: 10000

export:
  format: hf
  tensor_parallel: 8
